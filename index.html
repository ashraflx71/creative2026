<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative 2026 | أشرف حسن</title>
    <style>
        :root { --gold: #D4AF37; --black: #000; --gray: #1a1a1a; }
        body { background-color: var(--black); color: #fff; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 10px; text-align: center; }
        .gold-text { color: var(--gold); text-shadow: 0 0 5px rgba(212, 175, 55, 0.5); }
        .card { border: 2px solid var(--gold); border-radius: 15px; padding: 15px; background: var(--gray); margin-bottom: 15px; box-shadow: 0 4px 15px rgba(212,175,55,0.2); }
        canvas { width: 100%; border-radius: 12px; border: 1px solid #333; background: #000; display: block; margin: 10px auto; }
        textarea, select, input[type="file"] { width: 95%; padding: 12px; font-size: 18px; margin: 8px 0; background: #222; color: #fff; border: 1px solid #444; border-radius: 10px; outline: none; }
        .btn { width: 95%; padding: 15px; font-size: 19px; font-weight: bold; border-radius: 10px; cursor: pointer; border: none; margin-top: 8px; transition: 0.3s; color: #fff; }
        .btn-gold { background: linear-gradient(45deg, var(--gold), #FFD700); color: #000; }
        .btn-rec { background: #d9534f; }
        .btn-save { background: #28a745; }
        .btn-wa { background: #25D366; text-decoration: none; display: block; margin: 10px auto; }
        #vdoHidden { display: none; }
    </style>
</head>
<body>

    <h1 class="gold-text">Creative 2026 👑</h1>

    <div class="card">
        <button onclick="sayWelcome()" style="background:none; border:none; cursor:pointer;">
            <img src="https://img.icons8.com/fluency/96/D4AF37/microphone.png" style="width: 50px;">
        </button>
        <p class="gold-text" style="font-size: 14px; margin: 0;">اضغط لسماع ترحيب المبدع أشرف حسن</p>
    </div>

    <canvas id="creativeCanvas" width="1280" height="720"></canvas>
    <video id="vdoHidden" loop muted crossorigin="anonymous"></video>

    <div class="card">
        <h3 class="gold-text">📸 ارفع صورة أو فيديو</h3>
        <input type="file" id="mediaLoader" accept="image/*,video/*">
        
        <textarea id="txtInput" placeholder="اكتب نص التهنئة الملكي هنا..."></textarea>
        
        <select id="sndSelect" onchange="playSnd()">
            <option value="">-- اختر نغمة أو دعاء --</option>
            <option value="https://server11.mp3quran.net/a_hader/001.mp3">سورة الفاتحة (تلاوة)</option>
            <option value="https://www.bensound.com/bensound-music/bensound-memories.mp3">ذكريات ملكية</option>
        </select>
        <audio id="audioPlayer" controls style="width:100%; margin-top:10px; filter:invert(1);"></audio>

        <button class="btn btn-gold" onclick="doManualRender()">✨ استعراض وتحديث</button>
        <button class="btn btn-rec" id="recBtn" onclick="toggleRecording()">🔴 بدء تسجيل فيديو</button>
        <button class="btn btn-save" onclick="doDownloadImage()">💾 حفظ كصورة HD</button>
        
        <a href="https://wa.me/201026402440" class="btn btn-wa">💬 تواصل مع أشرف (واتساب)</a>
    </div>

    <script>
        const cvs = document.getElementById('creativeCanvas');
        const cx = cvs.getContext('2d');
        const vdo = document.getElementById('vdoHidden');
        let uploadedImg = new Image();
        let isVideo = false;
        let mediaRecorder;
        let chunks = [];

        // 1. معالجة الرفع (صور أو فيديو)
        document.getElementById('mediaLoader').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const url = URL.createObjectURL(file);
            if (file.type.startsWith('video')) {
                isVideo = true; vdo.src = url; vdo.play(); renderLoop();
            } else {
                isVideo = false; uploadedImg.src = url; uploadedImg.onload = () => doManualRender();
            }
        });

        // 2. محرك الرسم (Loop للفيديو و Manual للصورة)
        function renderLoop() {
            if (isVideo) {
                drawFrame();
                requestAnimationFrame(renderLoop);
            }
        }

        function doManualRender() { isVideo = false; drawFrame(); }

        function drawFrame() {
            cx.fillStyle = "#000";
            cx.fillRect(0, 0, cvs.width, cvs.height);
            if (isVideo) { cx.drawImage(vdo, 0, 0, cvs.width, cvs.height); }
            else if (uploadedImg.src) { cx.drawImage(uploadedImg, 0, 0, cvs.width, cvs.height); }

            // طبقة التعتيم والنص الذهبي
            cx.fillStyle = "rgba(0,0,0,0.3)"; cx.fillRect(0, 0, cvs.width, cvs.height);
            cx.textAlign = "center"; cx.font = "bold 85px Arial";
            let g = cx.createLinearGradient(0, 250, 0, 450);
            g.addColorStop(0.2, "#000"); g.addColorStop(0.7, "#D4AF37");
            cx.fillStyle = g;
            cx.shadowBlur = 15; cx.shadowColor = "#000";
            const txt = document.getElementById('txtInput').value || "Creative 2026";
            cx.fillText(txt, cvs.width/2, cvs.height/2 + 30);
        }

        // 3. التسجيل والتحميل
        function toggleRecording() {
            if (!mediaRecorder || mediaRecorder.state === "inactive") {
                chunks = [];
                const stream = cvs.captureStream(30);
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'video/mp4' });
                    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
                    a.download = 'Creative_2026.mp4'; a.click();
                };
                mediaRecorder.start();
                document.getElementById('recBtn').innerText = "⏹️ إيقاف وحفظ الفيديو";
            } else {
                mediaRecorder.stop();
                document.getElementById('recBtn').innerText = "🔴 بدء تسجيل فيديو";
            }
        }

        function doDownloadImage() {
            const a = document.createElement('a'); a.download = 'Creative_2026.png';
            a.href = cvs.toDataURL("image/png"); a.click();
        }

        function playSnd() { const p = document.getElementById('audioPlayer'); p.src = document.getElementById('sndSelect').value; p.play(); }
        function sayWelcome() {
            const m = new SpeechSynthesisUtterance("أهلاً بك في صالون أشرف حسن.. نصمم لك الفخامة بلمسات ذهبية.");
            m.lang = 'ar-EG'; window.speechSynthesis.speak(m);
        }
        window.onload = doManualRender;
    </script>
</body>
</html>
