<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="منصة أشرف الإبداعية 2026 - خبير SEO وتصميم واجهات المستخدم UX وحلول البرمجيات الخضراء في الإسكندرية.">
    <meta name="keywords" content="أشرف حسن، SEO، UX، البرمجيات الخضراء، أتمتة، Creative 2026">
    <title>أشرف الإبداعية 2026 | خبير SEO و UX</title>
    
    <style>
        /* نظام الألوان الفخم (أسود وذهبي) مع تحسين الأداء */
        :root { --gold: #D4AF37; --black: #000000; --white: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: var(--black); 
            color: var(--white); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            text-align: center;
        }

        h1 { 
            color: var(--gold); 
            font-size: clamp(28px, 8vw, 50px); /* خط مرن يناسب الموبايل والكمبيوتر */
            border-bottom: 3px solid var(--gold); 
            margin-bottom: 20px;
            padding-bottom: 10px;
            font-weight: 900;
        }

        p { font-size: clamp(18px, 4vw, 24px); margin-bottom: 15px; max-width: 800px; }
        
        .highlight { color: var(--gold); font-weight: bold; }

        .btn { 
            background: var(--gold); 
            color: var(--black); 
            padding: 18px 35px; 
            text-decoration: none; 
            border-radius: 50px; /* تصميم عصري أكثر انسيابية */
            font-weight: bold; 
            font-size: 20px;
            display: inline-block; 
            margin-top: 30px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }

        .btn:hover { 
            transform: scale(1.05); 
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.5); 
        }

        /* تحسين استهلاك الطاقة (البرمجيات الخضراء) عبر تقليل العمليات غير الضرورية */
        @media (prefers-reduced-motion: reduce) {
            .btn { transition: none; }
        }
    </style>
</head>
<body>
    <header>
        <h1>🌟 منصة أشرف الإبداعية 2026 🌟</h1>
    </header>
    
    <main>
        <p>خبير الـ <span class="highlight">SEO</span> وتصميم واجهات المستخدم <span class="highlight">UX</span></p>
        <p>هنا نبني مستقبل <span class="highlight">البرمجيات الخضراء</span> وأتمتة المحتوى الرقمي.</p>
        
        <a href="https://youtube.com/@ashrafhassan2026?sub_confirmation=1" class="btn" target="_blank" rel="noopener">اشترك في القناة ليصلك كل جديد</a>
    </main>

    <footer style="margin-top: 50px; font-size: 14px; color: #666;">
        &copy; 2026 جميع الحقوق محفوظة لـ أشرف حسن - الإسكندرية
    </footer>
</body>
</html>
