<script>
// 1. تسجيل الـ Service Worker (تأكد أن المسار صحيح)
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
            .then(reg => console.log('تم تسجيل المحرك بنجاح!', reg))
            .catch(err => console.log('فشل التسجيل:', err));
    });
}

// 2. دالة تشغيل الزر (المزامنة)
async function requestSync() {
    // إشعار بسيط للمستخدم (اختياري)
    console.log("محاولة تفعيل المزامنة...");
    
    if ('serviceWorker' in navigator && 'SyncManager' in window) {
        try {
            const registration = await navigator.serviceWorker.ready;
            // تسجيل الوسم الموجود في ملف sw.js الخاص بك
            await registration.sync.register('video-render-sync');
            
            // تنبيه نجاح يظهر على هاتفك
            alert("🚀 تم ربط نظام Creative 2026 بالسحابة بنجاح! المزامنة تعمل الآن.");
        } catch (err) {
            console.error("خطأ في المزامنة:", err);
            alert("حدث خطأ، تأكد من تحديث الصفحة.");
        }
    } else {
        // إذا كان المتصفح قديماً أو لا يدعم المزامنة
        alert("نظامك الحالي سيعمل بالوضع العادي (بدون مزامنة خلفية). يفضل استخدام Chrome.");
    }
}
</script>

    <script>
        async function requestSync() {
            if ('serviceWorker' in navigator) {
                const registration = await navigator.serviceWorker.ready;
                if ('sync' in registration) {
                    try {
                        await registration.sync.register('video-render-sync');
                        console.log('تم تسجيل المزامنة في الخلفية بنجاح!');
                    } catch (err) {
                        console.log('المزامنة في الخلفية فشلت:', err);
                    }
                }
            }
        }

        // تسجيل الـ Service Worker عند التحميل
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW Registered!', reg))
                    .catch(err => console.log('SW Registration Failed!', err));
            });
        }
    </script>
