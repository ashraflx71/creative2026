<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative 2026 | القائد التقني</title>
    <style>
        <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon-192.png">
        
        /* التصميم الملكي الفسفوري */
        body {
            background-color: #000000;
            color: #39FF14; /* أخضر فسفوري نيون */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        header {
            padding: 30px 0;
            border-bottom: 2px solid #39FF14;
            box-shadow: 0 0 15px #39FF14;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 26px; /* حجم الخط المفضل لديك */
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #39FF14;
        }

        /* حاوية الأزرار (الخدمات) */
        .grid-container {
            display: grid;
            grid-template-columns: 1fr; /* مناسب جداً للهاتف */
            gap: 20px;
        }

        .card {
            background: #111;
            border: 2px solid #39FF14;
            padding: 25px;
            border-radius: 15px;
            transition: 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: #39FF14;
        }

        .card:active {
            background: #39FF14;
            color: #000;
            box-shadow: 0 0 20px #39FF14;
        }

        .card h2 {
            margin: 0;
            font-size: 22px; /* الخط الواضح الذي تفضله */
        }

        .card p {
            font-size: 16px;
            color: #888;
        }

        footer {
            margin-top: 40px;
            font-size: 14px;
            color: #00FFFF; /* لمسة أزرق فسفوري */
        }
    </style>
</head>
<body>

    <header>
        <h1>CREATIVE 2026</h1>
        <p>لوحة تحكم القائد التقني</p>
    </header>

    <div class="grid-container">
        <!-- نظام YOU للدفع -->
        <a href="#payment" class="card">
            <h2>نظام YOU المالي 💳</h2>
            <p>إدارة المدفوعات (فودافون كاش / فوري)</p>
        </a>

        <!-- مترجم Palabra -->
        <a href="#translator" class="card">
            <h2>مترجم Palabra 🗣️</h2>
            <p>الترجمة الصوتية الفورية الاحترافية</p>
        </a>

        <!-- محاكي Eco-Pulse -->
        <a href="#simulator" class="card">
            <h2>محاكي Eco-Pulse 🦾</h2>
            <p>التحكم في الروبوتات بإشارات العضلات</p>
        </a>

        <!-- خدمات SEO -->
        <a href="#seo" class="card">
            <h2>خدمات SEO & UI/UX 🚀</h2>
            <p>تحسين محركات البحث وتصميم الواجهات</p>
        </a>
    </div>

    <footer>
        <p>تم التطوير بواسطة أشرف حسن © 2026</p>
    </footer>

</body>
</html>
