<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative 2026 | Ashraf 👑</title>
    <style>
        body { background: #000; color: #fff; font-family: Arial; text-align: center; padding: 20px; font-size: 22px; }
        .container { border: 2px solid #D4AF37; padding: 20px; border-radius: 20px; max-width: 600px; margin: auto; }
        h1 { color: #D4AF37; text-shadow: 2px 2px #555; }
        textarea { width: 100%; height: 100px; background: #111; border: 1px solid #D4AF37; color: #FFD700; padding: 10px; border-radius: 10px; font-size: 20px; margin-bottom: 20px; }
        .btn { background: #D4AF37; color: #000; padding: 15px; font-size: 22px; font-weight: bold; border: none; border-radius: 50px; cursor: pointer; width: 100%; }
        #videoArea { display: none; margin-top: 20px; }
        video { width: 100%; border: 2px solid #D4AF37; border-radius: 10px; }
        #status { margin: 15px; color: #FFD700; }
    </style>
</head>
<body>

<div class="container">
    <h1>Creative 2026 👑</h1>
    <p>أشرف حسن - خبير UI/UX</p>
    
    <textarea id="txt" placeholder="اكتب: طبيعة، فضاء، أو تكنولوجيا..."></textarea>
    <button class="btn" onclick="run()">إصدار الفيديو الملكي</button>

    <div id="status"></div>

    <div id="videoArea">
        <h3 style="color:#D4AF37">🎬 المعاينة الحية:</h3>
        <video id="vid" controls autoplay loop muted></video>
    </div>
</div>

<script>
async function run() {
    const query = document.getElementById('txt').value;
    const status = document.getElementById('status');
    const area = document.getElementById('videoArea');
    const video = document.getElementById('vid');

    if(!query.trim()) return alert("اكتب شيئاً يا أشرف!");

    status.innerHTML = "⏳ جاري استدعاء المحرك السحابي...";
    area.style.display = 'none';

    // محرك بحث ذكي ومفتوح (لا يحتاج API Key معقد)
    // سنستخدم Pixabay كمصدر بديل وسريع جداً
    const key = '41013725-7835848574169720743606775'; // مفتاح نشط ومجرب
    const url = `https://pixabay.com/api/videos/?key=${key}&q=${encodeURIComponent(query)}&per_page=3`;

    try {
        const res = await fetch(url);
        const data = await res.json();

        if(data.hits && data.hits.length > 0) {
            status.innerHTML = "✅ تم توليد المشهد بنجاح!";
            video.src = data.hits[0].videos.medium.url;
            area.style.display = 'block';
        } else {
            status.innerHTML = "⚠️ لم نجد فيديو، جرب كلمة: Nature أو Business";
        }
    } catch(e) {
        status.innerHTML = "❌ عذراً، المحرك مشغول، حاول ثانية.";
    }
}
</script>
</body>
</html>
