<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative 2026 | Ashraf 👑</title>
    <style>
        body { background: #000; color: #fff; font-family: Arial; text-align: center; padding: 20px; font-size: 20px; }
        .royal-card { border: 2px solid #D4AF37; padding: 20px; border-radius: 20px; max-width: 550px; margin: auto; background: #0a0a0a; box-shadow: 0 0 15px #D4AF37; }
        h1 { color: #D4AF37; font-size: 28px; }
        textarea { width: 100%; height: 80px; background: #111; border: 1px solid #D4AF37; color: #FFD700; padding: 10px; border-radius: 10px; font-size: 18px; margin-bottom: 15px; outline: none; box-sizing: border-box; }
        .btn { background: linear-gradient(45deg, #D4AF37, #FFD700); color: #000; padding: 15px; font-size: 20px; font-weight: bold; border: none; border-radius: 50px; cursor: pointer; width: 100%; }
        #videoArea { display: none; margin-top: 20px; }
        video { width: 100%; border-radius: 15px; border: 1px solid #444; }
        #status { margin: 10px; color: #FFD700; font-size: 16px; }
    </style>
</head>
<body>

<div class="royal-card">
    <h1>Creative 2026 👑</h1>
    <p style="font-size: 14px; color: #888;">بوابة أشرف حسن للإبداع الرقمي</p>
    
    <textarea id="userInput" placeholder="اكتب: فضاء، سيارات، أو أرنب..."></textarea>
    
    <button class="btn" onclick="startProcess()">توليد الفيديو الملكي 🎬</button>

    <div id="status"></div>

    <div id="videoArea">
        <video id="mainVid" controls playsinline>
            <source src="" type="video/mp4">
        </video>
    </div>
</div>

<script>
function startProcess() {
    const text = document.getElementById('userInput').value.trim().toLowerCase();
    const status = document.getElementById('status');
    const area = document.getElementById('videoArea');
    const video = document.getElementById('mainVid');

    if(!text) { alert("أدخل نصاً أولاً يا أشرف!"); return; }

    status.innerHTML = "⏳ جاري التحميل السريع...";
    area.style.display = 'none';

    // مكتبة فيديوهات "جوجل" السريعة جداً والمضمونة
    const library = {
        "أرنب": "https://www.w3schools.com/html/mov_bbb.mp4",
        "سيارات": "https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerJoyrides.mp4",
        "فضاء": "https://storage.googleapis.com/gtv-videos-bucket/sample/ElephantsDream.mp4"
    };

    setTimeout(() => {
        // اختيار الفيديو أو الافتراضي "سيارات"
        let url = library[text] || library["سيارات"];
        
        status.innerHTML = "✅ الفيديو جاهز للعرض!";
        video.src = url;
        video.load();
        area.style.display = 'block';
        video.play();
    }, 1000);
}
</script>

</body>
</html>
