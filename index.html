<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative 2026 👑</title>
    
    <link rel="manifest" href="/creative2026/manifest.json">
    <meta name="theme-color" content="#000000">

    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 22px; /* حجم خط مريح لرؤيتك */
            text-align: center;
            padding: 20px;
        }

        h1, h2 {
            background: linear-gradient(to bottom, #cf9d1d 22%, #ffeb4d 45%, #cf9d1d 50%, #ffeb4d 55%, #cf9d1d 78%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: bold;
            font-size: 35px;
        }

        .container {
            max-width: 600px;
            margin: auto;
            border: 1px solid #D4AF37;
            padding: 20px;
            border-radius: 15px;
        }

        textarea {
            width: 100%;
            height: 150px;
            background: #1a1a1a;
            border: 1px solid #D4AF37;
            color: white;
            font-size: 20px;
            padding: 15px;
            border-radius: 10px;
            box-sizing: border-box;
            margin-bottom: 20px;
        }

        .main-button {
            background-color: #D4AF37;
            color: black;
            padding: 15px 30px;
            font-size: 22px;
            border-radius: 50px;
            border: 2px solid #FFD700;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
        }

        .main-button:hover {
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.8);
            transform: scale(1.02);
        }

        #statusPanel {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none; /* يظهر عند بدء العمل */
            border: 1px dashed #D4AF37;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Creative 2026 👑</h1>
        <h3>🎬 منطقة الاختبار الملكي (أشرف حسن)</h3>
        
        <textarea id="userScript" placeholder="اكتب النص الذي تود تحويله لفيديو هنا..."></textarea>
        
        <button class="main-button" id="generateBtn" onclick="handleGenerateVideo()">إنشاء الفيديو الملكي</button>

        <div id="statusPanel"></div>
    </div>

    <script>
        // تسجيل الـ Service Worker لـ PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/creative2026/sw.js')
                .then(reg => console.log('ServiceWorker جاهز'))
                .catch(err => console.log('فشل تسجيل ServiceWorker', err));
            });
        }

        // وظيفة محرك التشغيل
        async function handleGenerateVideo() {
            const scriptText = document.getElementById('userScript').value;
            const statusPanel = document.getElementById('statusPanel');
            const btn = document.getElementById('generateBtn');

            if (!scriptText.trim()) {
                alert("يا أشرف، فضلاً أدخل النص أولاً لنبدأ الإبداع!");
                return;
            }

            statusPanel.style.display = 'block';
            statusPanel.style.color = "#D4AF37";
            statusPanel.innerHTML = "جاري الاتصال بالسيرفر السحابي... 🚀";
            btn.disabled = true;
            btn.style.opacity = "0.5";

            try {
                // محاكاة المعالجة (Green Software Principles)
                await new Promise(resolve => setTimeout(resolve, 3000));

                statusPanel.innerHTML = "✅ تم استلام النص بنجاح! جاري التجهيز وفق معايير Freemium.";
                statusPanel.style.color = "#FFD700";
                
            } catch (error) {
                statusPanel.innerHTML = "❌ عذراً، حدث خطأ في الاتصال.";
                statusPanel.style.color = "red";
            } finally {
                btn.disabled = false;
                btn.style.opacity = "1";
            }
        }
    </script>
</body>
</html>
