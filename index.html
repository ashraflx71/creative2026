<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative 2026 | Ashraf 👑</title>
    <style>
        body { background: #000; color: #D4AF37; text-align: center; font-family: Arial; padding: 20px; font-size: 22px; margin: 0; }
        .royal-card { border: 3px solid #D4AF37; padding: 25px; border-radius: 20px; background: #0a0a0a; box-shadow: 0 0 20px #D4AF37; max-width: 500px; margin: 20px auto; }
        h1 { font-size: 30px; margin-bottom: 5px; }
        .main-btn { background: linear-gradient(45deg, #D4AF37, #FFD700); color: #000; padding: 15px; width: 100%; border: none; border-radius: 50px; font-weight: bold; font-size: 20px; cursor: pointer; margin-top: 20px; }
        #videoBox { display: none; margin-top: 25px; }
        video { width: 100%; border-radius: 15px; border: 1px solid #D4AF37; box-shadow: 0 0 15px rgba(212, 175, 55, 0.5); }
    </style>
</head>
<body>

<div class="royal-card">
    <h1>Creative 2026 👑</h1>
    <p style="font-size: 16px; color: #888;">منصة أشرف حسن للذكاء الاصطناعي</p>
    
    <button class="main-btn" onclick="launchVideo()">إصدار العرض الملكي 🎬</button>

    <div id="videoBox">
        <h3 style="color:#D4AF37; font-size: 18px;">📺 تم جلب المشهد السحابي:</h3>
        <video id="myVideo" controls playsinline>
            <source src="https://storage.googleapis.com/gtv-videos-bucket/sample/ElephantsDream.mp4" type="video/mp4">
        </video>
    </div>
</div>

<script>
function launchVideo() {
    const box = document.getElementById('videoBox');
    const video = document.getElementById('myVideo');
    
    box.style.display = 'block';
    video.muted = false; // تفعيل الصوت برمجياً عند الضغط
    video.play().catch(e => {
        // إذا اعترض المتصفح، سيطلب منه الضغط يدوياً
        console.log("اضغط تشغيل على الفيديو مباشرة");
    });
}
</script>

</body>
</html>
