<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative 2026 👑</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#D4AF37">
    <meta name="description" content="منصة أشرف حسن الإبداعية 2026">

    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
            font-size: 20px;
        }
        .royal-border {
            border: 2px solid #D4AF37;
            padding: 20px;
            border-radius: 15px;
            max-width: 600px;
            margin: auto;
        }
        h1 {
            background: linear-gradient(to bottom, #cf9d1d, #ffeb4d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 35px;
        }
        textarea {
            width: 90%;
            height: 120px;
            background: #1a1a1a;
            border: 1px solid #D4AF37;
            color: white;
            padding: 10px;
            border-radius: 8px;
            font-size: 18px;
            margin-bottom: 20px;
        }
        .main-button {
            background-color: #D4AF37;
            color: black;
            padding: 15px 30px;
            font-size: 22px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
        }
        #statusPanel {
            margin-top: 20px;
            color: #FFD700;
            display: none;
        }
    </style>
</head>
<body>

    <div class="royal-border">
        <h1>Creative 2026 👑</h1>
        <h3>🎬 منطقة الاختبار (أشرف حسن)</h3>
        
        <textarea id="userScript" placeholder="اكتب النص هنا لتحويله لفيديو..."></textarea>
        
        <button class="main-button" onclick="startProcess()">إنشاء الفيديو الملكي</button>

        <div id="statusPanel" id="status"></div>
    </div>

    <script>
        // وظيفة التشغيل الفعلي
        function startProcess() {
            const text = document.getElementById('userScript').value;
            const status = document.getElementById('statusPanel');

            if (!text.trim()) {
                alert("من فضلك أدخل نصاً أولاً");
                return;
            }

            status.style.display = 'block';
            status.innerHTML = "⏳ جاري المعالجة السحابية... انتظر قليلاً";

            setTimeout(() => {
                status.innerHTML = "✅ تم الاستلام بنجاح! الرابط يعمل الآن يا أشرف.";
            }, 2000);
        }

        // تسجيل Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
            .then(() => console.log("Service Worker Active"));
        }
    </script>
</body>
</html>
