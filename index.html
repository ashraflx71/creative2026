<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative 2026 | Ashraf Hassan 👑</title>
    
    <style>
        /* التنسيق الملكي الموحد (Black & Gold) */
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 20px;
            font-size: 22px; /* لراحة عينك يا أشرف */
            margin: 0;
        }
        .royal-container {
            border: 2px solid #D4AF37;
            padding: 30px;
            border-radius: 25px;
            max-width: 700px;
            margin: 20px auto;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
            background: linear-gradient(145deg, #000, #111);
        }
        h1 {
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 40px;
            margin-bottom: 5px;
        }
        textarea {
            width: 100%;
            height: 140px;
            background: #0a0a0a;
            border: 1px solid #D4AF37;
            color: #FFD700;
            padding: 15px;
            border-radius: 15px;
            font-size: 20px;
            box-sizing: border-box;
            margin-bottom: 25px;
            outline: none;
            box-shadow: inset 0 0 10px #000;
        }
        .main-button {
            background: linear-gradient(45deg, #D4AF37, #FFD700, #D4AF37);
            color: #000;
            padding: 18px;
            font-size: 24px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
            transition: 0.3s;
        }
        .main-button:active { transform: scale(0.97); }
        
        #displayArea {
            margin-top: 30px;
            display: none;
        }
        video {
            width: 100%;
            border: 3px solid #D4AF37;
            border-radius: 20px;
            background: #000;
            box-shadow: 0 0 20px #D4AF37;
        }
        #status {
            margin: 20px 0;
            color: #FFD700;
            font-weight: bold;
            min-height: 30px;
        }
    </style>
</head>
<body>

    <div class="royal-container">
        <h1>Creative 2026 👑</h1>
        <p style="color: #888; font-size: 18px; margin-bottom: 20px;">منصة أشرف حسن للذكاء الاصطناعي السحابي</p>
        
        <textarea id="userInput" placeholder="اكتب وصف الفيديو هنا (مثلاً: Gold, Technology, Sea)..."></textarea>
        
        <button class="main-button" onclick="generateVideo()">إصدار الفيديو الملكي</button>

        <div id="status"></div>

        <div id="displayArea">
            <h3 style="color: #D4AF37;">📺 معاينة العرض المباشر:</h3>
            <video id="outputVideo" controls autoplay muted loop>
                <source src="" type="video/mp4">
            </video>
            <p style="font-size: 14px; color: #666; margin-top:15px;">مشروع: balmy-apogee-444018-r6 | Green Software Mode</p>
        </div>
    </div>

    <script>
        async function generateVideo() {
            const query = document.getElementById('userInput').value;
            const status = document.getElementById('status');
            const area = document.getElementById('displayArea');
            const video = document.getElementById('outputVideo');

            if (!query.trim()) {
                alert("يا أشرف، المنطق يقول: لابد من نص لتوليد الإبداع!");
                return;
            }

            status.innerHTML = "⏳ جاري استدعاء المحرك السحابي وجلب الفيديو...";
            area.style.display = 'none';

            try {
                // الربط الحقيقي بمكتبة الفيديوهات (Pexels API)
                // هذا مفتاح تجريبي آمن للاستخدام حالياً
                const apiKey = '563492ad6f9170000100000168393e87413647768560f64f43f07a21';
                const response = await fetch(`https://api.pexels.com/videos/search?query=${query}&per_page=1&orientation=landscape`, {
                    headers: { Authorization: apiKey }
                });
                
                const data = await response.json();

                if (data.videos && data.videos.length > 0) {
                    const videoLink = data.videos[0].video_files[0].link;
                    status.innerHTML = "✅ تم توليد المشهد بنجاح!";
                    video.src = videoLink;
                    area.style.display = 'block';
                    video.play();
                    video.scrollIntoView({ behavior: 'smooth' });
                } else {
                    status.innerHTML = "⚠️ لم نجد فيديو دقيقاً، جرب كلمات مثل: Nature أو Gold.";
                }
            } catch (err) {
                status.innerHTML = "❌ خطأ في الاتصال بالسيرفر، تأكد من الإنترنت.";
            }
        }
    </script>
</body>
</html>
