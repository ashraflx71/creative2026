<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة أشرف الإبداعية 2026 👑</title>
    <style>
        /* التيم الملكي: أسود وذهبي */
        body { background-color: #000; color: gold; font-family: Arial, sans-serif; text-align: center; padding: 20px; }
        h1 { color: gold; font-size: 40px; border-bottom: 2px solid gold; display: inline-block; padding-bottom: 10px; }
        
        /* شبكة عرض الفيديوهات (UI/UX) */
        .video-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 30px; }
        .video-card { background: #111; border: 2px solid gold; border-radius: 15px; padding: 15px; width: 300px; }
        
        /* وضوح النص (Readability 20px+) */
        p { font-size: 20px; margin-top: 10px; }
        video { width: 100%; border-radius: 10px; }
        
        .footer { margin-top: 50px; font-size: 18px; color: #888; }
    </style>
</head>
<body>

    <h1>منصة أشرف الإبداعية 2026 👑</h1>
    <p>🎬 منطقة الاختبار الملكي - محرك إنتاج الفيديو الذكي</p>

    <div class="video-grid">
        <div class="video-card">
            <video controls>
                <source src="classic_summary.mp4" type="video/mp4">
            </video>
            <p>📚 ملخصات الأدب الكلاسيكي</p>
        </div>

        <div class="video-card">
            <video controls>
                <source src="royal_test_zone.mp4" type="video/mp4">
            </video>
            <p>⚙️ تجربة المحرك الذكي</p>
        </div>
    </div>

    <div class="footer">تطوير: أشرف حسن - خبير SEO & UI/UX</div>

</body>
</html>
