<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0000FF">
    <title>Creative 2026 | القائد التقني</title>
    <style>
        /* تصميم خفيف جداً يحافظ على موارد الهاتف وعمر البطارية */
        body {
            background-color: #000000; /* خلفية سوداء */
            color: #FFFFFF; /* نص أبيض */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 22px; 
            text-align: center;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* إطار ذهبي رفيع جداً كما طلبت */
            border: 1px solid #D4AF37; 
            box-sizing: border-box;
        }
        h1 {
            color: #0000FF; /* أزرق احترافي */
            font-size: 38px;
            margin-bottom: 5px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        .subtitle {
            color: #D4AF37; /* لمسة ذهبية بسيطة للنص */
            font-size: 18px;
            margin-bottom: 20px;
        }
        .status-card {
            border: 1px solid #0000FF;
            padding: 20px;
            border-radius: 12px;
            background-color: rgba(0, 0, 255, 0.02);
            max-width: 90%;
        }
        .btn {
            background-color: #0000FF;
            color: white;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            display: inline-block;
            margin-top: 20px;
            border: 1px solid #FFFFFF; /* إطار أبيض بسيط للزر */
        }
        .footer-text {
            font-size: 12px;
            color: #555;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <h1>Creative 2026</h1>
    <div class="subtitle">رؤية تقنية بروح إبداعية</div>
    
    <div class="status-card">
        <p>منصة القائد التقني أشرف حسن</p>
        <p style="font-size: 16px;">تطبيقات PWA: خفيفة | سريعة | آمنة</p>
    </div>

    <a href="https://github.com/ashraflx71" class="btn">المشاريع التقنية</a>

    <p class="footer-text">Green Software - Optimized for Mobile</p>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
            .then(() => console.log("تم تفعيل المحرك الأخضر"));
        }
    </script>
</body>
</html>
