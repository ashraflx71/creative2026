<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative 2026 | المحرر الملكي</title>
    <link rel="icon" href="https://img.icons8.com/fluency/48/D4AF37/crown.png" type="image/png">
    <style>
        body { background-color: #000; color: #fff; font-family: Arial, sans-serif; margin: 0; padding: 15px; text-align: center; }
        h1 { color: #D4AF37; font-size: 32px; margin-bottom: 10px; text-shadow: 2px 2px #333; }
        #canvas-wrapper { border: 3px solid #D4AF37; background: #111; margin: 15px auto; max-width: 900px; border-radius: 15px; overflow: hidden; box-shadow: 0 0 20px rgba(212, 175, 55, 0.3); }
        canvas { width: 100%; height: auto; display: block; background: #000; }
        textarea, input { width: 95%; padding: 18px; font-size: 20px; margin: 10px 0; background: #222; color: #fff; border: 2px solid #444; border-radius: 12px; box-sizing: border-box; }
        .button { width: 95%; padding: 20px; font-size: 22px; font-weight: bold; background-color: #D4AF37; color: #000; border: none; border-radius: 12px; cursor: pointer; margin-top: 10px; text-decoration: none; display: inline-block; }
        .whatsapp-btn { background-color: #25D366; color: white; margin-top: 15px; }
        #subscription-panel { display:none; margin-top: 20px; padding: 25px; border: 4px dashed #D4AF37; background: #111; border-radius: 15px; }
        .gold-msg { color: #D4AF37; font-size: 20px; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

    <h1>Creative 2026 👑</h1>

    <div id="canvas-wrapper">
        <canvas id="mainCanvas" width="1280" height="720"></canvas>
    </div>

    <div id="controls-area">
        <textarea id="userText" placeholder="اكتب نص المعايدة هنا.."></textarea>
        <input type="text" id="bgUrl" placeholder="الصق رابط الصورة الذهبية هنا">
        <button class="button" onclick="applyAndDraw()">✨ تحديث التصميم</button>
        <button id="saveBtn" class="button" style="background-color: #28a745; color: white; display:none;" onclick="startRecording()">💾 حفظ الفيديو (Download)</button>
        <button id="shareBtn" class="button" style="background-color: #007bff; color: white; display:none;" onclick="shareSite()">🔗 مشاركة الموقع</button>
    </div>

    <div id="subscription-panel">
        <h2 style="color: #D4AF37;">انتهت المحاولات المجانية!</h2>
        <a href="https://ipn.eg/S/ashrafhassan567/instapay/9qNhXU" class="button">اشتراك InstaPay 💳</a>
        <a href="https://wa.me/201026402440" class="button whatsapp-btn">تفعيل عبر واتساب ✅</a>
    </div>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const bgImg = new Image();
        bgImg.crossOrigin = "anonymous";
        let videoCount = localStorage.getItem('creative2026_count') || 0;

        function checkLimits() {
            if (videoCount >= 3 && videoCount != -1) {
                document.getElementById('controls-area').style.display = 'none';
                document.getElementById('subscription-panel').style.display = 'block';
                return false;
            }
            return true;
        }

        function applyAndDraw() {
            const url = document.getElementById('bgUrl').value;
            document.getElementById('shareBtn').style.display = 'block';
            document.getElementById('saveBtn').style.display = 'block';
            if (url) {
                bgImg.src = url;
                bgImg.onload = () => render();
            } else { render(); }
        }

        function render() {
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            if (bgImg.complete && bgImg.src) {
                ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);
            }
            
            ctx.font = "bold 80px Arial";
            ctx.textAlign = "center";
            ctx.fillStyle = "#D4AF37"; // ذهبي صريح لضمان الظهور
            ctx.shadowBlur = 15;
            ctx.shadowColor = "black";

            const lines = (document.getElementById('userText').value || "Creative 2026").split('\n');
            let y = (canvas.height - (lines.length * 100)) / 2 + 70;
            lines.forEach(line => {
                ctx.fillText(line, canvas.width / 2, y);
                y += 100;
            });
        }

        // الكود المطور لتسجيل الفيديو على الموبايل
        function startRecording() {
            if (!checkLimits()) return;
            
            // تحديث الرسم مرة أخيرة قبل التسجيل
            render();

            const stream = canvas.captureStream(25); // 25 فريم لسهولة المعالجة
            const recorder = new MediaRecorder(stream, {
                mimeType: 'video/webm;codecs=vp8' // الصيغة الأكثر توافقاً مع جوجل كروم موبايل
            });
            
            const chunks = [];
            recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
            
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `Creative2026_${Date.now()}.webm`;
                document.body.appendChild(a);
                a.click();
                setTimeout(() => {
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(url);
                }, 100);

                if (videoCount != -1) {
                    videoCount++;
                    localStorage.setItem('creative2026_count', videoCount);
                    checkLimits();
                }
            };

            recorder.start();
            alert("جاري استخراج الفيديو.. سيتم التحميل تلقائياً بعد 5 ثوانٍ");
            setTimeout(() => recorder.stop(), 5000); // 5 ثواني كافية للتجربة
        }

        async function shareSite() {
            if (navigator.share) {
                navigator.share({ title: 'Creative 2026', url: window.location.href });
            } else { alert(window.location.href); }
        }

        window.onload = () => { checkLimits(); render(); };
    </script>
</body>
</html><div id="audio-library-section" style="margin-top: 25px; padding: 20px; border: 2px solid #D4AF37; border-radius: 15px; background: #111; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2);">
    
    <h3 style="color: #D4AF37; font-size: 22px; margin-bottom: 8px;">🎵 لمستك الصوتية الخاصة</h3>
    <p style="color: #ccc; font-size: 18px; margin-bottom: 15px; line-height: 1.5;">
        "اختر من مكتبتنا النغمة التي تناسب ذوقك الرفيع، واستمتع بتجربة إبداعية متكاملة."
    </p>

    <select id="audioSelect" onchange="playSelectedAudio()" style="width: 100%; padding: 15px; font-size: 18px; background: #222; color: #D4AF37; border: 1px solid #D4AF37; border-radius: 10px; cursor: pointer;">
        <option value="">-- اضغط هنا لاختيار النغمة --</option>
        <option value="https://www.bensound.com/bensound-music/bensound-memories.mp3">🎹 نغمة هادئة (ذكريات)</option>
        <option value="https://www.bensound.com/bensound-music/bensound-creativeminds.mp3">✨ نغمة إبداعية (مودرن)</option>
        <option value="https://www.bensound.com/bensound-music/bensound-slowmotion.mp3">👑 نغمة ملكية (بطيئة)</option>
    </select>

    <audio id="mainAudio" controls style="width: 100%; margin-top: 15px; filter: invert(1) hue-rotate(180deg);">
        <source id="audioSource" src="" type="audio/mpeg">
        متصفحك لا يدعم تشغيل الصوت.
    </audio>
</div>

<script>
// وظيفة تشغيل الصوت المختار بذكاء
function playSelectedAudio() {
    const select = document.getElementById('audioSelect');
    const audio = document.getElementById('mainAudio');
    const source = document.getElementById('audioSource');
    
    if (select.value) {
        source.src = select.value;
        audio.load();
        audio.play().catch(error => {
            console.log("تطلب بعض المتصفحات ضغطة زر لتشغيل الصوت: " + error);
        });
    } else {
        audio.pause();
    }
}
</script>
