<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>Creative 2026 | كرييتف</title>
    <style>
        body {
            background-color: #000000;
            color: #FFFFFF;
            font-family: Arial, sans-serif;
            font-size: 22px; /* الحجم الذي تفضله */
            text-align: center;
            margin: 0;
            padding: 20px;
            border: 2px solid #D4AF37; /* إطار ذهبي رفيع */
            min-height: 90vh;
        }
        h1 { color: #0000FF; } /* اللون الأزرق */
        .card {
            border: 1px solid #0000FF;
            padding: 15px;
            margin-top: 20px;
            border-radius: 8px;
        }
        .btn {
            background-color: #0000FF;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            display: inline-block;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <h1>Creative 2026</h1>
    <p>مرحباً بك في منصة القائد التقني أشرف حسن.</p>
    
    <div class="card">
        <p>خدمات UI/UX و SEO احترافية</p>
        <p>برمجيات خضراء خفيفة وعالية الأداء</p>
    </div>

    <a href="#" class="btn">استكشف المشاريع</a>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
