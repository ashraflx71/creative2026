<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative 2026 | Ashraf 👑</title>
    <style>
        body { background: #000; color: #fff; font-family: Arial; text-align: center; padding: 20px; font-size: 22px; margin: 0; }
        .royal-box { border: 2px solid #D4AF37; padding: 25px; border-radius: 20px; max-width: 600px; margin: 20px auto; box-shadow: 0 0 20px #D4AF37; background: #0a0a0a; }
        h1 { color: #D4AF37; font-size: 35px; margin-bottom: 5px; }
        textarea { width: 100%; height: 100px; background: #111; border: 1px solid #D4AF37; color: #FFD700; padding: 15px; border-radius: 12px; font-size: 20px; margin-bottom: 20px; outline: none; box-sizing: border-box; }
        .main-btn { background: linear-gradient(45deg, #D4AF37, #FFD700); color: #000; padding: 18px; font-size: 22px; font-weight: bold; border: none; border-radius: 50px; cursor: pointer; width: 100%; transition: 0.3s; }
        .main-btn:active { transform: scale(0.95); }
        #videoDisplay { display: none; margin-top: 25px; }
        video { width: 100%; border: 2px solid #D4AF37; border-radius: 15px; background: #000; box-shadow: 0 0 15px rgba(212, 175, 55, 0.5); }
        #status { margin: 15px; color: #FFD700; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>

<div class="royal-box">
    <h1>Creative 2026 👑</h1>
    <p style="font-size: 16px; color: #888;">منصة أشرف حسن للذكاء الاصطناعي</p>
    
    <textarea id="userInput" placeholder="اكتب: فضاء، ذهب، أو بحر..."></textarea>
    <button class="main-btn" onclick="startAI()">إصدار الفيديو الملكي</button>

    <div id="status"></div>

    <div id="videoDisplay">
        <h3 style="color:#D4AF37">📺 تم توليد المشهد الملكي:</h3>
        <video id="myVid" controls autoplay loop muted playsinline webkit-playsinline>
            <source src="" type="video/mp4">
        </video>
    </div>
</div>

<script>
function startAI() {
    const text = document.getElementById('userInput').value.trim();
    const status = document.getElementById('status');
    const display = document.getElementById('videoDisplay');
    const video = document.getElementById('myVid');

    if(!text) { alert("أدخل نصاً أولاً يا أشرف!"); return; }

    status.innerHTML = "⏳ جاري استدعاء السيرفر السحابي...";
    display.style.display = 'none';

    // روابط فيديوهات فخمة ومباشرة من Pexels CDN (تعمل 100%)
    const library = {
        "فضاء": "https://cdn.pixabay.com/video/2020/09/20/50531-462378875_large.mp4",
        "ذهب": "https://cdn.pixabay.com/video/2023/10/24/186350-877884485_large.mp4",
        "بحر": "https://cdn.pixabay.com/video/2021/09/13/88394-604771523_large.mp4",
        "تكنولوجيا": "https://cdn.pixabay.com/video/2023/04/18/159419-819129759_large.mp4"
    };

    setTimeout(() => {
        // إذا لم يجد الكلمة، سيختار فيديو "تكنولوجيا" كافتراضي فخم
        let selectedUrl = library[text] || library["تكنولوجيا"]; 
        
        status.innerHTML = "✅ تم التحميل بنجاح! شاهد الإبداع.";
        
        video.src = selectedUrl;
        video.load(); // أمر ضروري لتهيئة الفيديو الجديد
        
        display.style.display = 'block';
        video.play().catch(e => {
            status.innerHTML = "✅ الفيديو جاهز، اضغط 'Play' للمشاهدة.";
        });

        // تحريك الشاشة للفيديو تلقائياً
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }, 2000);
}
</script>
</body>
</html>
