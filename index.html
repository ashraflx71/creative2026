<div class="card">
    <h3 class="gold-text">🎬 ارفع فيديو من جهازك للتعديل</h3>
    <input type="file" id="videoLoader" accept="video/*" style="background: #222; color: #D4AF37; padding: 10px; border: 1px dashed #D4AF37; width: 90%; border-radius: 10px;">
    
    <textarea id="txtInput" placeholder="اكتب عبارة التهنئة على الفيديو..."></textarea>
    
    <button class="btn btn-gold" onclick="startVideoEditor()">✨ تشغيل ومعاينة الفيديو الذهبي</button>
    <p style="color: #888; font-size: 14px; margin-top: 5px;">* ملحوظة: الحفظ متاح حالياً كلقطة شاشة (HD Snapshot) من الفيديو.</p>
</div>

<video id="hiddenVideo" style="display:none;" loop muted></video>

<script>
    const cvs = document.getElementById('creativeCanvas');
    const cx = cvs.getContext('2d');
    const vdo = document.getElementById('hiddenVideo');
    let isVideoPlaying = false;

    // 1. التعامل مع رفع الفيديو من الجهاز
    document.getElementById('videoLoader').addEventListener('change', function(e) {
        const file = e.target.files[0];
        const url = URL.createObjectURL(file);
        vdo.src = url;
        vdo.load();
        vdo.onloadeddata = function() {
            isVideoPlaying = true;
            renderVideoFrame(); // بدء الرسم المستمر
        };
    });

    function startVideoEditor() {
        if(vdo.src) {
            vdo.play();
            isVideoPlaying = true;
            renderVideoFrame();
        } else {
            alert("من فضلك ارفع فيديو أولاً يا بطل!");
        }
    }

    // 2. محرك الرسم المستمر (يرسم النص فوق الفيديو)
    function renderVideoFrame() {
        if (!isVideoPlaying) return;

        // رسم فريم الفيديو الحالي على الكانفس
        cx.drawImage(vdo, 0, 0, cvs.width, cvs.height);

        // إضافة طبقة فخامة (تعتيم خفيف)
        cx.fillStyle = "rgba(0,0,0,0.3)";
        cx.fillRect(0, 0, cvs.width, cvs.height);

        // إعداد النص المشكل (أسود وذهبي)
        cx.textAlign = "center";
        cx.font = "bold 80px Arial";
        let g = cx.createLinearGradient(0, 250, 0, 450);
        g.addColorStop(0.2, "#000"); 
        g.addColorStop(0.6, "#D4AF37");
        cx.fillStyle = g;
        
        cx.shadowBlur = 20;
        cx.shadowColor = "rgba(0,0,0,0.9)";
        
        const val = document.getElementById('txtInput').value || "Creative 2026";
        cx.fillText(val, cvs.width/2, cvs.height/2 + 30);

        // تكرار الرسم مع كل فريم جديد من الفيديو
        requestAnimationFrame(renderVideoFrame);
    }
</script>
