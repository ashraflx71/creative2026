<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative 2026 | Ashraf 👑</title>
    <style>
        body { background: #000; color: #fff; font-family: Arial; text-align: center; padding: 20px; font-size: 22px; }
        .royal-box { border: 2px solid #D4AF37; padding: 25px; border-radius: 20px; max-width: 600px; margin: auto; box-shadow: 0 0 20px #D4AF37; }
        h1 { color: #D4AF37; margin-bottom: 5px; }
        textarea { width: 100%; height: 100px; background: #111; border: 1px solid #D4AF37; color: #FFD700; padding: 10px; border-radius: 10px; font-size: 20px; margin-bottom: 20px; outline: none; }
        .main-btn { background: #D4AF37; color: #000; padding: 18px; font-size: 22px; font-weight: bold; border: none; border-radius: 50px; cursor: pointer; width: 100%; }
        #videoDisplay { display: none; margin-top: 25px; }
        video { width: 100%; border: 2px solid #D4AF37; border-radius: 15px; background: #111; }
        #status { margin: 15px; color: #FFD700; font-weight: bold; }
    </style>
</head>
<body>

<div class="royal-box">
    <h1>Creative 2026 👑</h1>
    <p style="font-size: 16px; color: #aaa;">منصة أشرف حسن للذكاء الاصطناعي</p>
    
    <textarea id="userInput" placeholder="اكتب: فضاء، طبيعة، أو تجربة..."></textarea>
    <button class="main-btn" onclick="startAI()">إصدار الفيديو الملكي</button>

    <div id="status"></div>

    <div id="videoDisplay">
        <h3 style="color:#D4AF37">📺 تم توليد المشهد بنجاح:</h3>
        <video id="myVid" controls autoplay loop muted playsinline>
            <source id="vidSource" src="" type="video/mp4">
        </video>
    </div>
</div>

<script>
function startAI() {
    const text = document.getElementById('userInput').value.toLowerCase();
    const status = document.getElementById('status');
    const display = document.getElementById('videoDisplay');
    const video = document.getElementById('myVid');
    const source = document.getElementById('vidSource');

    if(!text.trim()) { alert("اكتب كلمة أولاً يا أشرف!"); return; }

    status.innerHTML = "⏳ جاري استدعاء المعالج السحابي المباشر...";
    display.style.display = 'none';

    // روابط فيديوهات مباشرة ومفتوحة (Direct & Open)
    const videos = {
        "فضاء": "https://www.w3schools.com/html/mov_bbb.mp4",
        "طبيعة": "https://www.w3schools.com/html/horse.mp4",
        "تجربة": "https://res.cloudinary.com/demo/video/upload/dog.mp4"
    };

    setTimeout(() => {
        // اختيار الفيديو بناء على الكلمة أو اختيار "تجربة" كافتراضي
        let selectedUrl = videos[text] || videos["تجربة"]; 
        
        status.innerHTML = "✅ تم التحميل بنجاح (Green Software Mode)!";
        
        // تحديث الفيديو بطريقة صحيحة تمنع الشاشة السوداء
        video.pause();
        video.src = selectedUrl;
        video.load();
        
        display.style.display = 'block';
        
        // محاولة التشغيل مع معالجة أخطاء المتصفح
        video.play().catch(e => {
            console.log("Auto-play prevented, user must click play.");
            status.innerHTML = "✅ اضغط تشغيل لمشاهدة المشهد الملكي";
        });
    }, 1500);
}
</script>
</body>
</html>
