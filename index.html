<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative 2026 👑</title>
    
    <!-- إضافة الكود الجديد هنا -->
    <link rel="manifest" href="/creative2026/manifest.json">
    <meta name="theme-color" content="#000000">
    
    <!-- يمكنك إضافة أي أكواد CSS أو JavaScript أخرى هنا -->
</head>
<body>
    <h1>Creative 2026 👑</h1>
    <h3>🎬 منطقة الاختبار الملكي (أشرف حسن)</h3>
    
    <!-- سكريبت تسجيل Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('/creative2026/sw.js').then(function(registration) {
                    console.log('ServiceWorker registered with scope: ', registration.scope);
                }, function(err) {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }
    </script>
</body>
</html>
