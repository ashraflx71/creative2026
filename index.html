<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative 2026 | Ashraf 👑</title>
    <style>
        body { background: #000; color: #D4AF37; text-align: center; font-family: Arial; padding: 20px; font-size: 22px; margin: 0; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .royal-card { border: 3px solid #D4AF37; padding: 30px; border-radius: 25px; background: #0a0a0a; box-shadow: 0 0 30px #D4AF37; width: 90%; max-width: 500px; }
        h1 { margin-bottom: 10px; font-size: 32px; text-shadow: 0 0 10px #D4AF37; }
        #videoContainer { margin-top: 20px; position: relative; width: 100%; height: 250px; background: #111; border-radius: 15px; overflow: hidden; border: 1px solid #444; cursor: pointer; }
        video { width: 100%; height: 100%; object-fit: cover; display: none; }
        .play-hint { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-size: 18px; font-weight: bold; background: rgba(212, 175, 55, 0.6); padding: 10px 20px; border-radius: 30px; pointer-events: none; }
        .status-text { margin-top: 15px; font-size: 16px; color: #888; }
    </style>
</head>
<body>

<div class="royal-card">
    <h1>Creative 2026 👑</h1>
    <p>أشرف حسن - اضغط على المربع بالأسفل</p>

    <div id="videoContainer" onclick="forcePlay()">
        <div id="hint" class="play-hint">اضغط هنا لتشغيل العرض 🎬</div>
        <video id="mainVid" playsinline loop muted>
            <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
        </video>
    </div>

    <p class="status-text">مشروع: balmy-apogee-444018-r6</p>
</div>

<script>
function forcePlay() {
    const v = document.getElementById('mainVid');
    const h = document.getElementById('hint');

    // إظهار الفيديو وتشغيله بقوة اللمس
    v.style.display = 'block';
    h.style.display = 'none';
    
    v.play().then(() => {
        console.log("المنطق انتصر.. الفيديو يعمل!");
    }).catch(err => {
        // إذا فشل، نحاول تشغيله صامتاً تماماً
        v.muted = true;
        v.play();
    });
}
</script>

</body>
</html>
